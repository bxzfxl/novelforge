# 由 migrate-to-operations.ts 自动迁移
roles:
  architect:
    name: 故事架构师
    prompt_file: prompts/writers/architect.md
    required: true
    operation_id: writer.architect
  main_writer:
    name: 主笔
    prompt_file: prompts/writers/main-writer.md
    required: true
    operation_id: writer.main
  character_advocate:
    name: 角色代言人
    prompt_file: prompts/writers/character-advocate.md
    required: false
    operation_id: writer.character_advocate
  atmosphere:
    name: 氛围渲染师
    prompt_file: prompts/writers/atmosphere.md
    required: false
    operation_id: writer.atmosphere
  foreshadow_weaver:
    name: 伏笔编织者
    prompt_file: prompts/writers/foreshadow-weaver.md
    required: false
    operation_id: writer.foreshadow_weaver
  critic:
    name: 批评家
    prompt_file: prompts/review/critic.md
    required: false
    operation_id: critic.review
  continuity_checker:
    name: 连续性审查员
    prompt_file: prompts/review/continuity.md
    required: false
    operation_id: continuity.check
chapter_types:
  daily:
    roles:
      - architect
      - main_writer
    estimated_tokens: 15000
  plot_advance:
    roles:
      - architect
      - main_writer
      - character_advocate
      - critic
    estimated_tokens: 40000
  climax:
    roles:
      - architect
      - main_writer
      - character_advocate
      - atmosphere
      - foreshadow_weaver
      - critic
      - continuity_checker
    enable_competition: true
    estimated_tokens: 70000
  foreshadow_resolve:
    roles:
      - architect
      - main_writer
      - foreshadow_weaver
      - continuity_checker
    estimated_tokens: 50000
